included:
  - ios

excluded:
  - Pods
  - node_modules
  - lib

disabled_rules:
  - trailing_whitespace
  - line_length

opt_in_rules:
  - empty_count
  - closure_spacing
  - force_unwrapping
  - implicit_return
  - modifier_order

type_name:
  min_length: 2
  max_length: 50

identifier_name:
  min_length: 2
  max_length: 50
  excluded:
    - id
    - x
    - y
    - i
    - e

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 60
  error: 100

reporter: "xcode"
