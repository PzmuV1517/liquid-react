name: Full Build Check

on:
  workflow_dispatch:

jobs:
  build:
    name: TypeScript + Native Compilation
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci --legacy-peer-deps

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: TypeScript type-check
        run: npm run typecheck

      - name: TypeScript build
        run: npm run build

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint
        run: swiftlint lint --config .swiftlint.yml

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update || echo "No Podfile found, skipping pod install"

      - name: Build with xcodebuild
        run: |
          xcodebuild \
            -workspace ios/*.xcworkspace \
            -scheme LiquidReact \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build \
            CODE_SIGNING_ALLOWED=NO | xcpretty || true
